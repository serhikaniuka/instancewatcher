<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EC2 Instance Watcher</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div id="app">
        <header>
            <h1>EC2 Instance Watcher</h1>
            <div id="user-info" class="hidden">
                <img id="user-avatar" alt="avatar" />
                <div class="user-meta">
                    <span id="user-name"></span>
                    <span id="user-email"></span>
                </div>
                <button id="sign-out-btn">Sign Out</button>
            </div>
        </header>

        <main>
            <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>
            <div id="login-section">
                <div class="login-card">
                    <h2>Sign in with Google</h2>
                    <p class="signin-prompt">Click below to sign in with your Google account:</p>
                    <div id="googleSignInBtn"></div>
                </div>
            </div>

            <div id="main-section" class="hidden">
                <p id="error" class="error hidden"></p>
                <section id="config-section" class="config-section">
                    <button id="config-toggle-btn" type="button" class="config-toggle-btn" aria-expanded="false">
                        <span class="config-toggle-icon">▶</span> Settings
                    </button>
                    <div id="config-content" class="config-content hidden">
                        <p class="config-desc">Enter your API URL and save for future sessions.</p>
                        <div class="config-inputs">
                            <label for="apiBaseUrl">API Gateway URL</label>
                            <input id="apiBaseUrl" type="text" placeholder="https://xxx.execute-api.region.amazonaws.com" autocomplete="off" />
                            <button id="saveConfigBtn" class="btn-primary">Save config</button>
                        </div>
                    </div>
                </section>
                <section>
                    <h2>Instances</h2>
                    <div id="instances"></div>
                </section>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
